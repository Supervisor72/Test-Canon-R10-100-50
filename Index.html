<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Test Fotocamere Canon – EOS R50 / R100 / R10</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin: 20px; background: #f4f4f4; }
.container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
button { padding: 12px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; }
button:hover { background: #0056b3; }
.hidden { display: none; }
.question { margin-bottom: 20px; padding: 15px; background: #eef2f7; border-radius: 8px; }
.timer { font-size: 22px; font-weight: bold; color: #d9534f; }
</style>
</head>

<body>
<div class="container">

<div id="startScreen">
    <h2>Test Fotocamere Canon – EOS R50 / R100 / R10</h2>

    <label>Nome:</label><br>
    <input type="text" id="nome"><br><br>

    <label>Cognome:</label><br>
    <input type="text" id="cognome"><br><br>

    <label>Punto Vendita:</label><br>
    <select id="pv">
        <option value="">Seleziona il punto vendita</option>
        <option value="Fano">Fano</option>
        <option value="Pesaro">Pesaro</option>
        <option value="Ancona">Ancona</option>
        <option value="Senigallia">Senigallia</option>
        <option value="Civitanova">Civitanova</option>
        <option value="Macerata">Macerata</option>
        <option value="Ascoli Piceno">Ascoli Piceno</option>
    </select>
    <br><br>

    <button onclick="startTest()">Inizia il Test</button>
</div>

<div id="testScreen" class="hidden">
    <div class="timer" id="timer">Tempo: 07:00</div>
    <div id="questions"></div>
    <button onclick="finishTest()">Consegna Test</button>
</div>

<div id="resultScreen" class="hidden">
    <h2>Risultato del Test</h2>
    <p id="summary"></p>
    <button onclick="sendEmail()">Invia risultato via email</button>
</div>

</div>

<script>
function generaCodice() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const blocco = () => Array.from({length: 4}, () => chars[Math.floor(Math.random()*chars.length)]).join("");
    return `${blocco()}-${blocco()}-${blocco()}`;
}

let codiceUnivoco = generaCodice();
let lastResult = {};

let domande = [
    { q: "Quale delle tre fotocamere ha il miglior AF tracking?", a: ["EOS R10","EOS R50","EOS R100","Tutte uguali"], c: 0 },
    { q: "Qual è la fotocamera più leggera e compatta?", a: ["EOS R100","EOS R50","EOS R10","Nessuna"], c: 0 },
    { q: "Quale modello offre la raffica più veloce?", a: ["EOS R10","EOS R50","EOS R100","Tutte uguali"], c: 0 },
    { q: "Quale fotocamera è più indicata per il vlogging?", a: ["EOS R50","EOS R100","EOS R10","Nessuna"], c: 0 },
    { q: "Quale modello NON ha lo schermo completamente articolato?", a: ["EOS R100","EOS R50","EOS R10","Tutte articolate"], c: 0 },
    { q: "Quale fotocamera ha il miglior autofocus per soggetti in movimento?", a: ["EOS R10","EOS R50","EOS R100","Nessuna"], c: 0 },
    { q: "Quale modello è il più economico?", a: ["EOS R100","EOS R50","EOS R10","Dipende dal kit"], c: 0 },
    { q: "Quali modelli registrano in 4K senza crop?", a: ["EOS R50 e EOS R10","Solo EOS R50","Solo EOS R10","Nessuna"], c: 0 },
    { q: "Quale fotocamera ha il mirino elettronico con maggiore risoluzione?", a: ["EOS R10","EOS R50","EOS R100","Tutte uguali"], c: 0 },
    { q: "Quale modello è più indicato per un principiante totale?", a: ["EOS R100","EOS R50","EOS R10","Nessuna"], c: 0 },
    { q: "Quale fotocamera supporta la raffica RAW burst?", a: ["EOS R10","EOS R50","EOS R100","Nessuna"], c: 0 },
    { q: "Quale modello ha la migliore ergonomia per uso prolungato?", a: ["EOS R10","EOS R50","EOS R100","Tutte uguali"], c: 0 },
    { q: "Quale fotocamera ha la modalità Creative Assist più avanzata?", a: ["EOS R50","EOS R100","EOS R10","Nessuna"], c: 0 },
    { q: "Quale modello NON ha la slitta multifunzione avanzata?", a: ["EOS R100","EOS R50","EOS R10","Nessuna"], c: 0 },
    { q: "Quale fotocamera ha il miglior rolling shutter?", a: ["EOS R10","EOS R50","EOS R100","Tutte uguali"], c: 0 },
    { q: "Quale modello ha la batteria con autonomia più elevata?", a: ["EOS R10","EOS R50","EOS R100","Nessuna"], c: 0 },
    { q: "Quale fotocamera è più adatta per fotografia sportiva entry-level?", a: ["EOS R10","EOS R50","EOS R100","Nessuna"], c: 0 },
    { q: "Quale modello ha la migliore qualità JPEG out-of-camera?", a: ["Tutte simili","EOS R50","EOS R10","EOS R100"], c: 0 },
    { q: "Quale fotocamera gestisce meglio il rumore ad alti ISO?", a: ["EOS R10","EOS R50","EOS R100","Tutte uguali"], c: 0 },
    { q: "Quale modello ha la migliore connettività smartphone?", a: ["EOS R50","EOS R10","EOS R100","Nessuna"], c: 0 }
];

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

let timeLeft = 420;
let timerInterval;

function startTimer(){
    timerInterval = setInterval(()=>{
        timeLeft--;
        let m = String(Math.floor(timeLeft/60)).padStart(2,"0");
        let s = String(timeLeft%60).padStart(2,"0");
        timer.innerText = `Tempo: ${m}:${s}`;
        if(timeLeft<=0){ clearInterval(timerInterval); finishTest(); }
    },1000);
}

function startTest(){
    if(!nome.value || !cognome.value || !pv.value){ alert("Compila tutti i campi"); return; }

    startScreen.classList.add("hidden");
    testScreen.classList.remove("hidden");

    shuffle(domande);

    let html="";
    domande.forEach((d,i)=>{
        let risposte = d.a.map((r,idx)=>({text:r,index:idx}));
        shuffle(risposte);

        html += `<div class="question"><p><b>${i+1}. ${d.q}</b></p>`;
        risposte.forEach(r=>{
            html += `<label><input type="radio" name="q${i}" value="${r.index}">${r.text}</label><br>`;
        });
        html += `</div>`;
    });

    questions.innerHTML = html;
    startTimer();
}

function finishTest(){
    clearInterval(timerInterval);

    let corrette=0, sbagliate=0, nonRisposte=0;

    domande.forEach((d,i)=>{
        let sel = document.querySelector(`input[name="q${i}"]:checked`);
        if(!sel) nonRisposte++;
        else if(parseInt(sel.value)===d.c) corrette++;
        else sbagliate++;
    });

    let punteggio = corrette - sbagliate - nonRisposte;
    let percentuale = Math.round((corrette/domande.length)*100);

    lastResult = {punteggio,percentuale,corrette,sbagliate,nonRisposte};

    testScreen.classList.add("hidden");
    resultScreen.classList.remove("hidden");

    summary.innerHTML = `
        Codice: <b>${codiceUnivoco}</b><br>
        Punteggio: <b>${punteggio}</b><br>
        Percentuale: <b>${percentuale}%</b><br>
        Corrette: ${corrette}<br>
        Sbagliate: ${sbagliate}<br>
        Non risposte: ${nonRisposte}
    `;

    inviaASheet(punteggio,percentuale,corrette,sbagliate,nonRisposte);
}

function inviaASheet(punteggio,percentuale,corrette,sbagliate,nonRisposte){
    fetch("https://script.google.com/macros/s/AKfycbwGp3jcJOuWGgKqKwx_IS5iXzYp_VIC_DV5Njx53enqW9RxF5NJpVfpbMkQO95lkyxE/exec",{
        method:"POST",
        mode:"no-cors",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            test:"canon_fotocamere",
            codice:codiceUnivoco,
            nome:nome.value,
            cognome:cognome.value,
            puntoVendita:pv.value,
            punteggio,
            percentuale,
            corrette,
            sbagliate,
            nonRisposte
        })
    });
}

function sendEmail(){
    let mail="d.pavoni@dml-italia.com";
    let subject="Risultato Test Fotocamere Canon";

    let body =
        "RISULTATO TEST FOTOCAMERE CANON%0D%0A" +
        "-----------------------------------------%0D%0A" +
        "Codice univoco: "+codiceUnivoco+"%0D%0A" +
        "Nome: "+nome.value+"%0D%0A" +
        "Cognome: "+cognome.value+"%0D%0A" +
        "Punto vendita: "+pv.value+"%0D%0A%0D%0A" +
        "Punteggio: "+lastResult.punteggio+"%0D%0A" +
        "Percentuale: "+lastResult.percentuale+"%0D%0A" +
        "Corrette: "+lastResult.corrette+"%0D%0A" +
        "Sbagliate: "+lastResult.sbagliate+"%0D%0A" +
        "Non risposte: "+lastResult.nonRisposte+"%0D%0A";

    window.location.href=`mailto:${mail}?subject=${subject}&body=${body}`;
}
</script>

</body>
</html>
